<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOL Control Center</title>
    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=v0.1.7">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <script src="app.js?v=v0.1.7" defer></script>
</head>

<body>
    <div id="app">
        <!-- Login View -->
        <div id="login-view" class="view active">
            <div class="glass-panel login-panel">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" class="icon">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                        <line x1="12" y1="2" x2="12" y2="12"></line>
                    </svg>
                </div>
                <h2>Wake on LAN</h2>
                <p class="subtitle">Control center</p>

                <form id="login-form">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <div class="input-group">
                        <input type="text" id="api-url" placeholder="API URL (e.g. https://router:8443)" required>
                    </div>
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me" checked>
                        <span class="toggle-switch"></span>
                        <span class="remember-text">Remember me</span>
                    </label>
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <span class="btn-text">Authenticate</span>
                        <div class="spinner hidden"></div>
                    </button>
                    <div id="login-error" class="error-message"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
            <header class="dashboard-header">
                <div class="header-content">
                    <div class="logo-small">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                            <line x1="12" y1="2" x2="12" y2="12"></line>
                        </svg>
                        <h1>WOL Dashboard</h1>
                    </div>
                    <div class="user-menu-container">
                        <button id="user-menu-btn" class="btn btn-outline user-menu-btn">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <span id="display-username">User</span>
                            <svg id="menu-chevron" class="chevron" viewBox="0 0 24 24" width="14" height="14"
                                stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div id="user-dropdown" class="dropdown-menu glass-panel hidden">
                            <div class="dropdown-header">
                                <div class="dropdown-header-title">
                                    <span class="dropdown-label">API Server</span>
                                    <span class="version-badge">v0.1.7</span>
                                </div>
                                <p class="dropdown-api-url" id="display-api-url">...</p>
                            </div>
                            <div class="dropdown-divider"></div>
                            <a href="https://github.com/Mat1RX/WakeOnLan-Control-Center" target="_blank"
                                class="btn btn-outline btn-full btn-sm">
                                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                                    fill="none" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                                    </path>
                                </svg>
                                GitHub Repository
                            </a>
                            <button id="logout-btn" class="btn btn-danger btn-full btn-sm">
                                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                                    fill="none" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                    <polyline points="16 17 21 12 16 7"></polyline>
                                    <line x1="21" y1="12" x2="9" y2="12"></line>
                                </svg>
                                Logout
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="dashboard-main">
                <div class="panel-header">
                    <h2>Devices</h2>
                    <button id="refresh-all-btn" class="btn btn-secondary btn-sm">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        Refresh All
                    </button>
                </div>
                <div id="devices-list" class="devices-grid">
                    <!-- Devices will be injected here by JS -->
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading devices...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Template for Device Card -->
    <template id="device-card-template">
        <div class="device-card glass-panel">
            <div class="device-info">
                <h3 class="device-name">Device Name</h3>
                <div class="status-indicator">
                    <span class="status-dot offline"></span>
                    <span class="status-text">Checking status...</span>
                </div>
            </div>
            <div class="device-actions">
                <button class="btn btn-primary btn-wake">Wake Up</button>
                <button class="btn btn-icon btn-refresh" title="Check Status">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2" />
                    </svg>
                </button>
            </div>
        </div>
    </template>

    <div id="toast-container" class="toast-container"></div>
</body>

</html>
