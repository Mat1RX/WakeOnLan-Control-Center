name: Deploy Frontend

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Version into Frontend
        run: |
          sed -i "s/__APP_VERSION__/${{ github.ref_name }}/g" frontend/index.html
          sed -i "s/__CACHE_VERSION__/wol-cache-${{ github.ref_name }}/g" frontend/sw.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          force_orphan: true
